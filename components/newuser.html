<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add System User | POS CORE</title>
    <style>
        :root { --sidebar-dark: #2c3e50; --accent-orange: #e67e22; --bg-page: #f4f6f9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-page); margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2, h3 { color: var(--sidebar-dark); margin-top: 0; border-bottom: 2px solid var(--bg-page); padding-bottom: 10px; text-transform: uppercase; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button.save-btn { background: var(--accent-orange); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--sidebar-dark); color: white; padding: 12px; text-align: left; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--sidebar-dark); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>👤 Add System User</h2>
    <form id="userForm">
        <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
        <button type="submit" class="save-btn">Save User</button>
    </form>
    <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    <div style="margin-top:40px;">
        <h3>Existing Users</h3>
        <table>
            <thead><tr><th>ID</th><th>Username</th><th style="text-align:right;">Action</th></tr></thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', loadUsers);
    async function loadUsers() {
        const users = await window.authAPI.getAllUsers();
        document.getElementById('userTableBody').innerHTML = users.map(user => `
            <tr><td>#${user.id}</td><td><strong>${user.username}</strong></td>
            <td style="text-align:right;">${user.username === 'admin' ? '<i>System</i>' : `<button class="del-btn" onclick="deleteUser(${user.id})">Delete</button>`}</td></tr>`).join('');
    }
    document.getElementById('userForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await window.authAPI.addUser({ username: document.getElementById('username').value, password: document.getElementById('password').value });
        if(res.success) { alert("User Added!"); document.getElementById('userForm').reset(); loadUsers(); }
    };
    async function deleteUser(id) { if(confirm("Delete this user?")) { const res = await window.authAPI.deleteUser(id); if(res.success) loadUsers(); } }
</script>
</body>
</html>
