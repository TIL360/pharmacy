<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Report | PHARMA 2026</title>
    <!-- Add FontAwesome for icons if not already included -->
    <link rel="stylesheet" href="../assets/css/all.min.css">

    <style>
        /* Basic styling to match your screenshot */
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; }
        .report-container { max-width: 1200px; margin: 20px auto; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .report-header { background: #3498db; color: white; padding: 20px 30px; }
        .controls { display: flex; gap: 20px; align-items: flex-end; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .input-group input { padding: 8px; border: none; border-radius: 4px; }
        .btn-generate { background: #2ecc71; border: none; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #dee2e6; color: #666; font-size: 0.9rem; }
        .report-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .text-right { text-align: right; }
        .btn-back { text-decoration: none; color: #333; font-weight: bold; font-size: 0.9rem; border: 1px solid #ccc; padding: 5px 15px; border-radius: 4px; }
        .back-link { 
            display: block; 
            margin-top: 20px; 
            text-align: center; 
            color: #7f8c8d; 
            text-decoration: none; 
            font-size: 0.9rem; 
        }
        .back-link:hover { color: #2c3e50; text-decoration: underline; }

        .btn-back {
            background: #fff;
            border: 1px solid #ccc;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
            color: #333;
            text-decoration: none;
            font-size: 13px;
        }
        .btn-back:hover { background: #f9f9f9; }
    </style>
</head>
<body>

    <div class="report-container">
        <!-- Dashboard Navigation -->
        <div style="padding: 10px 30px; background: #eee;">
    <a href="dashboard.html" class="btn-back">Back to Dashboard</a>
        </div>

        <div class="report-header">
            <h2><i class="fas fa-chart-line"></i> Sales Report by User</h2>
            <div class="controls">
                <div class="input-group">
                    <label>Select Date</label>
                    <input type="date" id="report-date">
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="report-username" placeholder="Enter username">
                </div>
                <button class="btn-generate" onclick="loadReport()">
                    <i class="fas fa-sync"></i> Generate Report
                </button>
            </div>
        </div>

        <div class="report-content">
            <table class="report-table">
                <thead>
                    <tr>
                        <th>ID (Sale / Product)</th>
                        <th>Customer / Product Name</th>
                        <th>Time / Qty</th>
                        <th class="text-right">Total (Rs.) / Unit Price</th>
                    </tr>
                </thead>
                <tbody id="report-tbody">
                    <tr>
                        <td colspan="4" style="text-align:center; padding:50px; color:#999;">
                            Enter details and click Generate Report to see data.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="report-footer">
            <!-- Payment Method Breakdown -->
            <div style="display: flex; justify-content: flex-end; gap: 30px; padding: 10px; border-bottom: 1px solid #ddd; color: #555;">
                <span>Cash: <b id="total-cash">Rs. 0.00</b></span>
                <span>Online: <b id="total-online">Rs. 0.00</b></span>
                <span>Bank: <b id="total-bank">Rs. 0.00</b></span>
            </div>
            
            <!-- Grand Total -->
            <div class="grand-total-display" style="text-align: right; padding: 15px; font-size: 1.4em;">
                Grand Total: <span id="grand-total" style="color: #27ae60; font-weight: bold;">Rs. 0.00</span>
            </div>
        </div>
    </div>

<script>
    async function loadReport() {
        const dateVal = document.getElementById('report-date').value;
        const userVal = document.getElementById('report-username').value;
        const tbody = document.getElementById('report-tbody');
        
        const grandTotalEl = document.getElementById('grand-total');
        const cashTotalEl = document.getElementById('total-cash');
        const onlineTotalEl = document.getElementById('total-online');
        const bankTotalEl = document.getElementById('total-bank');

        if (!dateVal || !userVal) {
            alert("Please select both a date and a username.");
            return;
        }

        try {
            // Fetch updated data from backend
            const sales = await window.authAPI.getSalesReport({ date: dateVal, username: userVal });
            
            let html = '';
            let grandTotal = 0;
            let cashTotal = 0;
            let onlineTotal = 0;
            let bankTotal = 0;

            if (!sales || sales.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px; color:#999;">No sales records found.</td></tr>';
                grandTotalEl.innerText = "Rs. 0.00";
                cashTotalEl.innerText = "Rs. 0.00";
                onlineTotalEl.innerText = "Rs. 0.00";
                bankTotalEl.innerText = "Rs. 0.00";
                return;
            }

            sales.forEach(sale => {
                const sTotal = Number(sale.total) || 0;
                grandTotal += sTotal;

                // Extract Payment Method and normalize to lowercase for logic
                const method = sale.payment_method ? String(sale.payment_method).trim() : "Unknown";
                const lowerMethod = method.toLowerCase();

                // Corrected Conditional Logic
                if (lowerMethod === 'cash') {
                    cashTotal += sTotal;
                } else if (lowerMethod === 'online') { 
                    onlineTotal += sTotal;
                } else if (lowerMethod === 'bank') {
                    bankTotal += sTotal;
                }

                const timeStr = new Date(sale.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                // Construct UI Rows
                html += `
                    <tr class="sale-header-row" style="background: #f8f9fa; font-weight: bold; border-left: 4px solid #3498db;">
                        <td><i class="fas fa-receipt"></i> SALE #${sale.id} <small style="color:#e67e22;">(${method})</small></td>
                        <td>${sale.customer}</td>
                        <td>${timeStr}</td>
                        <td class="text-right">Rs. ${sTotal.toFixed(2)}</td>
                    </tr>`;

                sale.items.forEach(item => {
                    html += `
                        <tr style="color: #7f8c8d; font-size: 0.85rem;">
                            <td style="padding-left: 40px;">PID: ${item.id}</td>
                            <td>${item.name}</td>
                            <td>Qty: ${item.qty}</td>
                            <td class="text-right">@ Rs. ${Number(item.price).toFixed(2)}</td>
                        </tr>`;
                });
            });

            // Final UI Update
            tbody.innerHTML = html;
            grandTotalEl.innerText = `Rs. ${grandTotal.toFixed(2)}`;
            cashTotalEl.innerText = `Rs. ${cashTotal.toFixed(2)}`;
            onlineTotalEl.innerText = `Rs. ${onlineTotal.toFixed(2)}`;
            bankTotalEl.innerText = `Rs. ${bankTotal.toFixed(2)}`;

        } catch (err) {
            console.error("Report Error:", err);
        }
    }
</script>



</body>
</html>
