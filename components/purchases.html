<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Purchase Records | POS CORE</title>
    <style>
        :root { --sidebar-dark: #2c3e50; --accent-orange: #e67e22; --bg-page: #f4f6f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-page); padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 1200px; margin: auto; }
        
        /* Search Bar Styling */
        .search-container { margin-bottom: 20px; position: relative; }
        .search-box { 
            width: 100%; padding: 12px 15px; border: 1.5px solid #dee2e6; 
            border-radius: 6px; font-size: 15px; box-sizing: border-box; 
        }
        .search-box:focus { outline: none; border-color: var(--accent-orange); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: var(--sidebar-dark); color: white; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        tr:hover { background-color: #f8f9fa; }

        .btn-edit { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-edit:hover { opacity: 0.9; }

        /* Pagination Buttons */
        .pagination-nav { margin-top: 20px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .btn-nav { background: white; border: 1px solid #ccc; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
        .btn-nav:disabled { cursor: not-allowed; opacity: 0.5; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; width: 400px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 5px; font-weight: bold; color: #666; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        
        .btn-back { background: #fff; border: 1px solid #ccc; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; display: inline-block; color: #333; text-decoration: none; font-size: 13px; }
        .btn-back:hover { background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="card">
        <a href="dashboard.html" class="btn-back">Back to Dashboard</a>
        <h2 style="color: var(--sidebar-dark); margin-top: 0;">📦 Purchase History</h2>

        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="Search medicine name or batch number..." onkeyup="filterPurchases()">
        </div>

        <table id="purchaseTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product Name</th>
                    <th>Batch</th>
                    <th>Expiry</th>
                    <th>Qty</th>
                    <th>Cost</th>
                    <th style="text-align: center;">Action</th>
                </tr>
            </thead>
            <tbody id="purchaseBody"></tbody>
        </table>

        <!-- Pagination Controls -->
        <div id="paginationNav" class="pagination-nav"></div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: var(--sidebar-dark);">Edit Purchase Record</h3>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" id="editExpiry">
            </div>
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="editQty">
            </div>
            <button onclick="saveEdit()" style="background:var(--accent-orange); color:white; border:none; padding:12px; width:100%; border-radius: 4px; font-weight: bold; cursor: pointer;">Update Record</button>
            <button onclick="closeModal()" style="margin-top:10px; width:100%; background: none; border: none; color: #7f8c8d; cursor: pointer;">Cancel</button>
        </div>
    </div>

    <script>
        let purchaseData = [];
        let filteredData = [];
        let currentPage = 1;
        const recordsPerPage = 10;

        // 1. Load Data
        async function loadPurchases() {
            try {
                purchaseData = await window.inventoryAPI.getPurchases();
                filteredData = [...purchaseData];
                renderTable();
            } catch (err) {
                console.error("Load Error:", err);
                document.getElementById('purchaseBody').innerHTML = `<tr><td colspan="7" style="text-align:center; color:red;">Error loading records.</td></tr>`;
            }
        }

        // 2. Render Table
        function renderTable() {
            const tbody = document.getElementById('purchaseBody');
            const startIndex = (currentPage - 1) * recordsPerPage;
            const endIndex = startIndex + recordsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);

            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">No purchase records found.</td></tr>`;
                renderPagination(0);
                return;
            }

            tbody.innerHTML = pageData.map(p => `
                <tr>
                    <td>#${p.id}</td>
                    <td style="font-weight: 600;">${p.product_name}</td>
                    <td>${p.batch_no}</td>
                    <td>${p.expiry_date}</td>
                    <td>${p.quantity}</td>
                    <td>Rs.${p.cost_price.toFixed(2)}</td>
                    <td style="text-align: center;">
                        <button class="btn-edit" onclick='openEdit(${JSON.stringify(p)})'>Edit</button>
                    </td>
                </tr>
            `).join('');

            renderPagination(filteredData.length);
        }

        // 3. Search Filter
        function filterPurchases() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            currentPage = 1;

            if (!query) {
                filteredData = [...purchaseData];
            } else {
                filteredData = purchaseData.filter(p => 
                    p.product_name.toLowerCase().includes(query) || 
                    p.batch_no.toLowerCase().includes(query)
                );
            }
            renderTable();
        }

        // 4. Pagination Controls
        function renderPagination(total) {
            const nav = document.getElementById('paginationNav');
            const totalPages = Math.ceil(total / recordsPerPage);

            nav.innerHTML = `
                <button class="btn-nav" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(-1)">Previous</button>
                <span>Page <strong>${currentPage}</strong> of ${totalPages || 1}</span>
                <button class="btn-nav" ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''} onclick="changePage(1)">Next</button>
            `;
        }

        function changePage(step) {
            currentPage += step;
            renderTable();
            window.scrollTo(0, 0);
        }

        // 5. Modal Logic
        function openEdit(p) {
            document.getElementById('editId').value = p.id;
            document.getElementById('editExpiry').value = p.expiry_date;
            document.getElementById('editQty').value = p.quantity;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        async function saveEdit() {
            const data = {
                id: document.getElementById('editId').value,
                expiry_date: document.getElementById('editExpiry').value,
                quantity: parseInt(document.getElementById('editQty').value)
            };

            const res = await window.inventoryAPI.updatePurchase(data);
            if(res.success) { 
                alert('✅ Purchase Record Updated!'); 
                closeModal();
                loadPurchases(); // Reload fresh data
            } else {
                alert('❌ Error: ' + res.error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadPurchases);
    </script>
</body>
</html>
