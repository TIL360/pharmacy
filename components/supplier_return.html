<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supplier Return | POS CORE</title>
    <style>
        :root { --sidebar-dark: #2c3e50; --accent-orange: #e67e22; --bg-page: #f4f6f9; --border-light: #dee2e6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-page); padding: 40px; margin: 0; color: #333; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 650px; margin: auto; }
        h2 { color: var(--sidebar-dark); border-bottom: 2px solid var(--bg-page); padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--sidebar-dark); font-size: 13px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1.5px solid var(--border-light); border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input:focus { outline: none; border-color: var(--accent-orange); }
        
        /* SEARCH DROPDOWN */
        .search-dropdown { position: absolute; width: 100%; background: white; border: 1px solid var(--sidebar-dark); z-index: 1000; max-height: 250px; overflow-y: auto; box-shadow: 0 8px 16px rgba(0,0,0,0.15); border-radius: 0 0 6px 6px; }
        .search-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .search-item:hover, .search-item.active { background-color: #f8f9fa; border-left: 4px solid var(--accent-orange); color: var(--accent-orange); }

        .stock-info { background: #f8f9fa; padding: 15px; border-radius: 6px; margin-top: 10px; border-left: 4px solid var(--sidebar-dark); }
        .btn-return { width: 100%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; background-color: var(--accent-orange); color: white; text-transform: uppercase; margin-top: 20px; }
        .btn-back { background: #fff; border: 1px solid #ccc; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; display: inline-block; color: #333; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

<a href="dashboard.html" class="btn-back">Back to Dashboard</a>

<div class="card">
    <h2>🔄 Supplier Return</h2>
    
    <div class="form-group">
        <label>Search Product (Name or Batch No):</label>
        <input type="text" id="productSearch" placeholder="Type name or scan batch barcode..." autocomplete="off">
        <div id="search-results" class="search-dropdown" style="display:none;"></div>
    </div>

    <!-- Details Section -->
    <div id="productDetails" style="display:none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
        <div class="stock-info">
            <p><strong>Product:</strong> <span id="dispName"></span></p>
            <p><strong>Batch:</strong> <span id="dispBatch"></span></p>
            <p><strong>Available Stock:</strong> <span id="dispStock" style="color: #e74c3c; font-weight: bold;"></span></p>
        </div>

        <div class="form-group" style="margin-top:20px;">
            <label>Supplier / Wholesaler Name:</label>
            <input type="text" id="supplier" placeholder="Who are you returning this to?">
        </div>

        <div class="form-group">
            <label>Quantity to Return:</label>
            <input type="number" id="qty" min="1" value="1">
        </div>

        <button class="btn-return" onclick="handleSupplierReturn()">Deduct Stock & Process Return</button>
    </div>
</div>

<script>
    let currentBatch = null;
    let selectedIndex = -1;
    let filteredBatches = [];
    const searchInput = document.getElementById('productSearch');
    const resultsDiv = document.getElementById('search-results');

    // 1. DUAL SEARCH LOGIC (Name & Batch)
    searchInput.addEventListener('input', async (e) => {
        const query = e.target.value.trim();
        if (query.length < 2) { 
            resultsDiv.style.display = 'none'; 
            return; 
        }
        // This now calls the updated SQL query that searches both fields
        filteredBatches = await window.authAPI.searchBatchesByName(query);
        renderResults();
    });

    function renderResults() {
        resultsDiv.innerHTML = '';
        if (filteredBatches.length > 0) {
            resultsDiv.style.display = 'block';
            filteredBatches.forEach((b, index) => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `<strong>${b.name}</strong> <br> <small>Batch: ${b.batch_no} | Stock: ${b.batch_stock}</small>`;
                div.onclick = () => selectBatch(b);
                resultsDiv.appendChild(div);
            });
        } else {
            resultsDiv.style.display = 'none';
        }
    }

    // 2. KEYBOARD NAVIGATION
    searchInput.addEventListener('keydown', (e) => {
        const items = resultsDiv.getElementsByClassName('search-item');
        if (resultsDiv.style.display === 'none') return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            selectedIndex = (selectedIndex + 1) % items.length;
            updateActive(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            selectedIndex = (selectedIndex - 1 + items.length) % items.length;
            updateActive(items);
        } else if (e.key === 'Enter') {
            if (selectedIndex > -1) selectBatch(filteredBatches[selectedIndex]);
        }
    });

    function updateActive(items) {
        Array.from(items).forEach(i => i.classList.remove('active'));
        if (items[selectedIndex]) items[selectedIndex].classList.add('active');
    }

    function selectBatch(batch) {
        currentBatch = batch;
        searchInput.value = batch.name;
        resultsDiv.style.display = 'none';
        
        document.getElementById('dispName').innerText = batch.name;
        document.getElementById('dispBatch').innerText = batch.batch_no;
        document.getElementById('dispStock').innerText = batch.batch_stock;
        document.getElementById('productDetails').style.display = 'block';
        document.getElementById('supplier').focus();
    }

    async function handleSupplierReturn() {
        const qty = parseInt(document.getElementById('qty').value);
        const supplier = document.getElementById('supplier').value;

        if (!supplier) return alert("Please enter supplier name");
        if (qty <= 0 || qty > currentBatch.batch_stock) return alert("Invalid quantity!");

        const result = await window.authAPI.processSupplierReturn({
            productId: currentBatch.product_id,
            batchNo: currentBatch.batch_no,
            quantity: qty,
            supplier: supplier
        });

        if (result.success) {
            alert("✅ Stock adjusted. Return successful.");
            location.reload();
        }
    }
</script>
</body>
</html>
